name: Testing configuration Variables

on:
  workflow_dispatch

env:
  cloud: google-cloud

jobs:
  welcome_job:
    runs-on: ubuntu-latest
    env:
      Greeting: welcome
    steps:
      - name: "Say Hello to Rahul Master of DevOps"
        run: echo "$Greeting $First_Name is using $cloud with project ${{ vars.PROJECT_ID }}!"
        env:
          First_Name: Rahul Girhepunje
